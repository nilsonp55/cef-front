<div *ngIf="spinnerActive" class="disenio-spinner">
  <mat-spinner></mat-spinner>
</div>

<!-- Button to trigger showing the form for a new entry -->
<div class="row" *ngIf="mostrarTabla">
  <div class="col-2">
    <button mat-raised-button class="ubicacion-btn-dominio" color="primary" (click)="onAddNewPuntoCodigo()">
      Nuevo
    </button>
  </div>
</div>

<!-- Container for the new DotsCodeTableComponent -->
<div *ngIf="mostrarTabla">
  <app-dots-code-table
    [displayedColumns]="displayedColumnsPuntosCodigo"
    [tiposPuntoOptions]="tiposPuntoParaFiltro"
    [bancosOptions]="bancos"
    [transportadorasOptions]="transportadoras"
    [ciudadesOptions]="ciudades"
    [initialPageIndex]="initialTablePageIndex"
    [initialPageSize]="initialTablePageSize"
    (editItem)="handleEditPuntoCodigo($event)"
    (exportAction)="handleTableExport()">
    <!-- totalRecords will be managed by table component itself since it loads its own data -->
    <!-- initialData is not passed as table component fetches its own data -->
  </app-dots-code-table>
</div>

<!-- Container for the DotsCodeFormComponent (already refactored) -->
<div *ngIf="mostrarFormulario">
  <app-dots-code-form
    [initialData]="currentPuntoCodigoData"
    [bancos]="bancos"
    [transportadoras]="transportadoras"
    [ciudades]="ciudades"
    [esEdicion]="esEdicion"
    (formSubmit)="handleFormSubmit($event)"
    (cancel)="handleCancelForm()">
  </app-dots-code-form>
</div>
